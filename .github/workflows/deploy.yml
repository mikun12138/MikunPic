name: deploy

on:
  push:
    branches: [ "action_test" ]

jobs:
  build-and-deploy:
    environment: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # backend
#      - name: Build ktor
#        run: ./gradlew :server:shadowJar

      - name: Check all secrets
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PASS: ${{ secrets.SERVER_PASSWORD }}
          KEY: ${{ secrets.SERVER_SSH_KEY }}

        run: |
          missing=0
          
          [ -n "$HOST" ] || { echo "SERVER_HOST missing"; missing=1; }
          [ -n "$USER" ] || { echo "SERVER_USER missing"; missing=1; }
          [ -n "$PASS" ] || echo "SERVER_PASSWORD missing (not fatal)"
          [ -n "$KEY" ]  || { echo "SERVER_SSH_KEY missing"; missing=1; }
          
          if [ "$missing" -eq 1 ]; then
            echo "required secrets missing"
            exit 1
          fi
          
          echo "✔ all required secrets exist"

